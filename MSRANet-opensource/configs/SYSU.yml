prefix: SYSU_all_test
fp16: true

resume: E:\lcy\code\MAFNet\checkpoints\sysu\SYSU_all\SYSU_all_model_140.pth

# dataset
sample_method: identity_random #identity_uniform #identity_random
image_size: (384, 144) #(384, 144)
p_size: 8 #12
k_size: 10 #10

dataset: sysu

# loss
bg_kl: true
sm_kl: true
decompose: true
distalign: false
IP: false
classification: true
center_cluster: false
triplet: true
center: false
fb_dt: false
ao: false
cli: true
edb: false

# parameters
margin: 1.3
# pattern attention
num_parts: 0
weight_sep: 0.5
# mutual learning
update_rate: 0.2
weight_sid: 0.5
weight_KL: 2.5

# architecture
drop_last_stride: true
pattern_attention: false
mutual_learning: false
modality_attention: 0

# optimizer
lr: 0.00035
optimizer: adam
num_epoch: 0 #160
lr_step: [55, 95]

# augmentation
random_flip: true
random_crop: true
random_erase: true
color_jitter: false
padding: 10

# log
log_period: 40
start_eval: 60
eval_interval: 10
